name: spectaacademy
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.0.0 # Sesuaikan dengan versi SDK Anda jika perlu

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  http: ^1.1.0
  shared_preferences: ^2.2.2
  intl: ^0.19.0 
  image_picker: ^1.0.4
  table_calendar: ^3.1.0
  url_launcher: ^6.2.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  # Perbaikan Bagian Assets
  assets:
    - assets/images/  # Dengan ini, semua gambar di folder tersebut otomatis terdaftar